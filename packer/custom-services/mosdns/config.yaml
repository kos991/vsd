log:
  level: info
  file: "/opt/custom-services/mosdns/mosdns.log"

plugins:
  - tag: geosite_cn
    type: domain_set
    args:
      files:
        - "/opt/custom-services/geo/geolocation-cn.txt"

  - tag: geosite_noncn
    type: domain_set
    args:
      files:
        - "/opt/custom-services/geo/geolocation-!cn.txt"

  - tag: cache
    type: cache
    args:
      size: 8192
      lazy_cache_ttl: 86400

  - tag: forward_cn
    type: forward
    args:
      concurrent: 2
      upstreams:
        - addr: "udp://223.5.5.5"
        - addr: "udp://119.29.29.29"
        - addr: "udp://114.114.114.114"

  - tag: forward_doh
    type: forward
    args:
      concurrent: 2
      upstreams:
        # [FIX] 使用用户提供的节点 DoH，实现抗污染与海外最优 CDN 节点分配
        # 通过 dial_addr 绕过引导解析死循环问题
        - addr: "https://<YOUR_DOH_ENDPOINT>"
          dial_addr: "<YOUR_NODE_IP>:443"
          enable_pipeline: true

  - tag: main_sequence
    type: sequence
    args:
      - matches: qtype 28
        exec: reject 3
      - exec: "$cache"
      - matches: has_resp
        exec: accept
      - matches:
          - qname $geosite_cn
        exec: "$forward_cn"
      - matches: has_resp
        exec: accept
      - matches:
          - qname $geosite_noncn
        exec: "$forward_doh"
      - matches: has_resp
        exec: accept
      - exec: "$forward_doh"

  - tag: udp_server
    type: udp_server
    args:
      entry: main_sequence
      listen: "<LAN_BIND_IP>:53"

  - tag: tcp_server
    type: tcp_server
    args:
      entry: main_sequence
      listen: "<LAN_BIND_IP>:53"
