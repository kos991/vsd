name: Build Debian gateway OVA

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      debian_version:
        description: Debian major version
        required: true
        default: '13'
      debian_codename:
        description: Debian release codename
        required: true
        default: trixie
      daed_version:
        description: daed release tag, or latest
        required: true
        default: latest
      paopaodns_image:
        description: PaoPaoDNS container image
        required: true
        default: sliamb/paopaodns:latest
      xanmod_package:
        description: XanMod kernel package
        required: true
        default: linux-xanmod-x64v3
      disk_size:
        description: Raw disk image size
        required: true
        default: 8G
      memory_mb:
        description: OVF memory hint in MB
        required: true
        default: '2048'
      cpu_count:
        description: OVF CPU hint
        required: true
        default: '2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build OVA
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      DEBIAN_VERSION: ${{ inputs.debian_version || '13' }}
      DEBIAN_CODENAME: ${{ inputs.debian_codename || 'trixie' }}
      DAED_VERSION: ${{ inputs.daed_version || 'latest' }}
      PAOPAODNS_IMAGE: ${{ inputs.paopaodns_image || 'sliamb/paopaodns:latest' }}
      XANMOD_PACKAGE: ${{ inputs.xanmod_package || 'linux-xanmod-x64v3' }}
      DISK_SIZE: ${{ inputs.disk_size || '8G' }}
      MEMORY_MB: ${{ inputs.memory_mb || '2048' }}
      CPU_COUNT: ${{ inputs.cpu_count || '2' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare diagnostics artifact
        run: |
          DIST_DIR="${GITHUB_WORKSPACE}/dist"
          mkdir -p "${DIST_DIR}"
          {
            echo "run_id=${GITHUB_RUN_ID}"
            echo "sha=${GITHUB_SHA}"
            echo "debian_version=${DEBIAN_VERSION}"
            echo "debian_codename=${DEBIAN_CODENAME}"
            echo "daed_version=${DAED_VERSION}"
            echo "paopaodns_image=${PAOPAODNS_IMAGE}"
            echo "xanmod_package=${XANMOD_PACKAGE}"
            echo "disk_size=${DISK_SIZE}"
          } >"${DIST_DIR}/ci-context.txt"
          echo 125 >"${DIST_DIR}/build.status"
          echo "Build did not start yet. Check earlier workflow steps." >"${DIST_DIR}/build.log"

      - name: Install build tools
        run: |
          DIST_DIR="${GITHUB_WORKSPACE}/dist"
          mkdir -p "${DIST_DIR}"
          exec > >(tee "${DIST_DIR}/install-tools.log") 2>&1
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends software-properties-common
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bash \
            ca-certificates \
            curl \
            dosfstools \
            e2fsprogs \
            fdisk \
            grub2-common \
            grub-pc-bin \
            libarchive-tools \
            libguestfs-tools \
            parted \
            qemu-utils \
            rsync \
            tar \
            xz-utils
          sudo apt-get purge -y passt || true
          docker --version

      - name: Run template smoke tests
        shell: bash
        run: |
          DIST_DIR="${GITHUB_WORKSPACE}/dist"
          mkdir -p "${DIST_DIR}"
          status=0
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./tests/smoke.ps1 >"${DIST_DIR}/smoke.log" 2>&1 || status=$?
          cat "${DIST_DIR}/smoke.log"
          exit "${status}"

      - name: Build OVA
        run: bash scripts/ci-build-debian-ova.sh

      - name: List artifact files
        if: always()
        shell: bash {0}
        run: |
          set +e
          DIST_DIR="${GITHUB_WORKSPACE}/dist"
          sudo mkdir -p "${DIST_DIR}"
          sudo chown -R "$(id -u):$(id -g)" "${DIST_DIR}" || true
          mkdir -p "${DIST_DIR}"
          if [ ! -f "${DIST_DIR}/build.status" ]; then
            echo 124 >"${DIST_DIR}/build.status"
            echo "Build status was missing before artifact upload." >"${DIST_DIR}/build.log"
          fi
          if [ -f "${DIST_DIR}/install-tools.log" ]; then
            echo "----- dist/install-tools.log -----"
            cat "${DIST_DIR}/install-tools.log"
          fi
          echo "Artifact directory: ${DIST_DIR}"
          find "${DIST_DIR}" -maxdepth 2 -type f -print -exec ls -lh {} \; || true
          exit 0

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daed-debian-gateway-diagnostics
          path: ${{ github.workspace }}/dist/*
          if-no-files-found: warn
          retention-days: 14

      - name: Upload OVA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daed-debian-gateway-ova
          path: ${{ github.workspace }}/dist/*.ova
          if-no-files-found: error
          retention-days: 14

      - name: Check build result
        if: always()
        run: |
          status="$(cat "${GITHUB_WORKSPACE}/dist/build.status")"
          if [ "${status}" -ne 0 ]; then
            echo "OVA build failed with status ${status}."
            echo "----- dist/build.log -----"
            cat "${GITHUB_WORKSPACE}/dist/build.log"
            message="$(tail -n 40 "${GITHUB_WORKSPACE}/dist/build.log" | sed ':a;N;$!ba;s/%/%25/g;s/\r/%0D/g;s/\n/%0A/g')"
            echo "::error title=OVA build failed::status=${status}%0A${message}"
            exit "${status}"
          fi
