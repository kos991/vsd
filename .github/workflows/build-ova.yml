name: Build Alpine gateway OVA

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      alpine_version:
        description: Alpine release branch
        required: true
        default: '3.24'
      daed_version:
        description: daed release tag, or latest
        required: true
        default: latest
      mini_ppdns_ref:
        description: mini-ppdns binary branch/ref
        required: true
        default: release
      disk_size:
        description: Raw disk image size
        required: true
        default: 4G
      memory_mb:
        description: OVF memory hint in MB
        required: true
        default: '1024'
      cpu_count:
        description: OVF CPU hint
        required: true
        default: '1'

permissions:
  contents: read

jobs:
  build:
    name: Build OVA
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ALPINE_VERSION: ${{ inputs.alpine_version || '3.24' }}
      DAED_VERSION: ${{ inputs.daed_version || 'latest' }}
      MINI_PPDNS_REF: ${{ inputs.mini_ppdns_ref || 'release' }}
      DISK_SIZE: ${{ inputs.disk_size || '4G' }}
      MEMORY_MB: ${{ inputs.memory_mb || '1024' }}
      CPU_COUNT: ${{ inputs.cpu_count || '1' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bash \
            ca-certificates \
            curl \
            dosfstools \
            e2fsprogs \
            fdisk \
            grub2-common \
            grub-pc-bin \
            libarchive-tools \
            parted \
            qemu-utils \
            rsync \
            tar \
            xz-utils

      - name: Run template smoke tests
        shell: pwsh
        run: ./tests/smoke.ps1

      - name: Build OVA
        run: |
          status=0
          sudo --preserve-env=ALPINE_VERSION,DAED_VERSION,MINI_PPDNS_REF,DISK_SIZE,MEMORY_MB,CPU_COUNT \
            bash scripts/build-alpine-ova.sh >/tmp/ova-build.log 2>&1 || status=$?
          cat /tmp/ova-build.log || true
          mkdir -p dist
          cp /tmp/ova-build.log dist/build.log || echo 'build log was not created' > dist/build.log
          echo "${status}" > dist/build.status
          ls -la dist
          exit 0

      - name: Upload OVA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dae-alpine-gateway-ova
          path: |
            dist/*.ova
            dist/*.sha256
            dist/build.log
            dist/build.status
          if-no-files-found: error
          retention-days: 14

      - name: Check build result
        run: |
          test "$(cat dist/build.status)" -eq 0
