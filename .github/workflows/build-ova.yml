name: Build VyOS 1.5 daed Gateway Image

on:
  workflow_dispatch:
    inputs:
      daed_version:
        description: "daed release tag, or latest"
        required: true
        type: string
        default: latest
      use_china_mirror:
        description: "Use a China Debian mirror for the source ISO build"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  VYOS_BUILD_REF: current
  VYOS_BUILD_IMAGE: vyos/vyos-build:current
  DAED_VERSION: ${{ inputs.daed_version || 'latest' }}
  USE_CHINA_MIRROR: ${{ inputs.use_china_mirror || false }}

jobs:
  build:
    name: Source-build injected VyOS image
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Free runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: false
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host tools
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates \
            curl \
            git \
            jq \
            unzip \
            xz-utils

      - name: Clone vyos-build (${{ env.VYOS_BUILD_REF }})
        shell: bash
        run: |
          set -euo pipefail
          git clone -b "${VYOS_BUILD_REF}" --single-branch \
            https://github.com/vyos/vyos-build.git vyos-build

      - name: Apply build-time patches
        shell: bash
        run: |
          set -euo pipefail
          if [ -f patches/vyos-build/001-add-nexttrace-repo.patch ]; then
            echo "Applying nexttrace repository patch..."
            patch -p1 -d vyos-build < patches/vyos-build/001-add-nexttrace-repo.patch
          fi

      - name: Prepare live-build custom files
        shell: bash
        run: |
          set -euo pipefail

          INCLUDES="${GITHUB_WORKSPACE}/vyos-build/data/live-build-config/includes.chroot"
          HOOKS="${GITHUB_WORKSPACE}/vyos-build/data/live-build-config/hooks/live"
          CUSTOM="${INCLUDES}/opt/custom-services"
          BIN="${INCLUDES}/usr/local/bin"
          SYSTEMD="${INCLUDES}/lib/systemd/system"

          mkdir -p \
            "${CUSTOM}/bin" \
            "${CUSTOM}/geo" \
            "${CUSTOM}/daed" \
            "${CUSTOM}/mosdns" \
            "${CUSTOM}/scripts" \
            "${CUSTOM}/system" \
            "${BIN}" \
            "${SYSTEMD}" \
            "${HOOKS}"

          latest_daed_tag() {
            curl -fsSL "https://api.github.com/repos/daeuniverse/daed/releases?per_page=30" |
              jq -r '
                .[]
                | select(.tag_name | test("^v?[0-9]"))
                | select(any(.assets[]?; .name | test("daed-linux-x86_64\\.zip$"; "i")))
                | .tag_name
              ' |
              head -n 1
          }

          download_release_asset() {
            repo="$1"
            asset_regex="$2"
            output_name="$3"
            version="${4:-latest}"

            tmp="$(mktemp -d)"
            if [ "${version}" = "latest" ]; then
              api_url="https://api.github.com/repos/${repo}/releases/latest"
            else
              api_url="https://api.github.com/repos/${repo}/releases/tags/${version}"
            fi

            asset_url="$(
              curl -fsSL "${api_url}" |
                jq -r --arg re "${asset_regex}" '.assets[] | select(.name | test($re; "i")) | .browser_download_url' |
                head -n 1
            )"
            if [ -z "${asset_url}" ] || [ "${asset_url}" = "null" ]; then
              echo "No matching release asset for ${repo}, regex=${asset_regex}" >&2
              exit 1
            fi

            archive="${tmp}/asset"
            curl -fL --retry 5 --retry-delay 3 "${asset_url}" -o "${archive}"

            mkdir -p "${tmp}/extract"
            case "${asset_url}" in
              *.zip) unzip -q "${archive}" -d "${tmp}/extract" ;;
              *.tar.gz|*.tgz) tar -xzf "${archive}" -C "${tmp}/extract" ;;
              *.tar.xz|*.txz) tar -xJf "${archive}" -C "${tmp}/extract" ;;
              *) cp "${archive}" "${tmp}/extract/${output_name}" ;;
            esac

            found="$(
              find "${tmp}/extract" -type f \
                \( -name "${output_name}" -o -name "${output_name}-linux-x86_64" -o -name "${output_name}-linux-amd64" \) |
                head -n 1
            )"
            if [ -z "${found}" ]; then
              echo "Binary ${output_name} not found in ${asset_url}" >&2
              exit 1
            fi

            install -m 0755 "${found}" "${BIN}/${output_name}"
            install -m 0755 "${found}" "${CUSTOM}/bin/${output_name}"
            rm -rf "${tmp}"
          }

          if [ "${DAED_VERSION}" = "latest" ]; then
            DAED_VERSION="$(latest_daed_tag)"
          fi
          if [ -z "${DAED_VERSION}" ]; then
            echo "Unable to resolve daed release tag." >&2
            exit 1
          fi

          download_release_asset "daeuniverse/daed" "daed-linux-x86_64\\.zip$" "daed" "${DAED_VERSION}"
          download_release_asset "IrineSistiana/mosdns" "linux.*(x86_64|amd64).*(zip|tar\\.gz|tgz)$" "mosdns"

          RULES_RAW_BASE="https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release"
          curl -fL --retry 5 --retry-delay 3 \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat" \
            -o "${CUSTOM}/geo/geoip.dat"
          curl -fL --retry 5 --retry-delay 3 \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" \
            -o "${CUSTOM}/geo/geosite.dat"
          curl -fL --retry 5 --retry-delay 3 \
            "${RULES_RAW_BASE}/direct-list.txt" \
            -o "${CUSTOM}/geo/geolocation-cn.txt"
          curl -fL --retry 5 --retry-delay 3 \
            "${RULES_RAW_BASE}/proxy-list.txt" \
            -o "${CUSTOM}/geo/geolocation-!cn.txt"

          cp -a packer/custom-services/daed/. "${CUSTOM}/daed/"
          cp -a packer/custom-services/mosdns/. "${CUSTOM}/mosdns/"
          cp -a packer/custom-services/scripts/dns-hijack.sh "${CUSTOM}/scripts/"
          cp -a packer/custom-services/scripts/geosite-update.sh "${CUSTOM}/scripts/"
          cp -a packer/custom-services/scripts/update-daed.sh "${CUSTOM}/scripts/"
          cp -a packer/custom-services/scripts/vsd.sh "${CUSTOM}/scripts/"
          cp -a packer/custom-services/system/. "${CUSTOM}/system/"
          cp scripts/late-bind.sh "${CUSTOM}/scripts/late-bind.sh"
          
          # Create global shortcut
          ln -sf /opt/custom-services/scripts/vsd.sh "${BIN}/vsd"
          for config_file in \
            "${CUSTOM}/daed/config.dae" \
            "${CUSTOM}/mosdns/config.yaml" \
            "${CUSTOM}/scripts/dns-hijack.sh" \
            "${CUSTOM}/scripts/geosite-update.sh" \
            "${CUSTOM}/scripts/update-daed.sh" \
            "${CUSTOM}/scripts/vsd.sh" \
            "${CUSTOM}/scripts/late-bind.sh" \
            "${CUSTOM}/system/sysctl.conf"; do
            sed -i 's|/config/custom-services|/opt/custom-services|g' "${config_file}"
          done

          # Disable annoying systemd network altnames globally
          mkdir -p "${INCLUDES}/etc/systemd/network/99-default.link.d"
          cat > "${INCLUDES}/etc/systemd/network/99-default.link.d/no-altnames.conf" <<'EOF'
          [Link]
          AlternativeNamesPolicy=
          EOF

          mkdir -p "${INCLUDES}/etc/sysctl.d"
          cp "${CUSTOM}/system/sysctl.conf" "${INCLUDES}/etc/sysctl.d/99-daed-gateway.conf"

          cp systemd/late-bind.service "${SYSTEMD}/late-bind.service"
          cat > "${SYSTEMD}/mosdns.service" <<'EOF'
          [Unit]
          Description=MosDNS LAN DNS engine
          After=network-online.target
          Wants=network-online.target

          [Service]
          Type=simple
          Nice=-5
          OOMScoreAdjust=-200
          ExecStart=/usr/local/bin/mosdns start -c /opt/custom-services/mosdns/config.yaml
          ExecReload=/bin/systemctl try-restart mosdns.service
          Restart=on-failure
          RestartSec=3
          LimitNOFILE=1048576

          [Install]
          WantedBy=multi-user.target
          EOF

          cat > "${SYSTEMD}/daed.service" <<'EOF'
          [Unit]
          Description=daed eBPF transparent proxy
          After=network-online.target mosdns.service
          Wants=network-online.target mosdns.service

          [Service]
          Type=simple
          Nice=-10
          OOMScoreAdjust=-500
          Environment=HOME=/root
          Environment=XDG_DATA_HOME=/root/.local/share
          ExecStartPre=-/bin/mount -t bpf bpf /sys/fs/bpf
          ExecStart=/usr/local/bin/daed run -c /opt/custom-services/daed/
          Restart=on-failure
          RestartSec=3
          LimitMEMLOCK=infinity
          LimitNOFILE=1048576
          AmbientCapabilities=CAP_NET_ADMIN CAP_NET_BIND_SERVICE CAP_NET_RAW CAP_BPF CAP_SYS_ADMIN
          CapabilityBoundingSet=CAP_NET_ADMIN CAP_NET_BIND_SERVICE CAP_NET_RAW CAP_BPF CAP_SYS_ADMIN

          [Install]
          WantedBy=multi-user.target
          EOF

          cp scripts/99-custom-proxy.chroot "${HOOKS}/99-custom-proxy.chroot"
          chmod +x "${HOOKS}/99-custom-proxy.chroot"

          cat > "${GITHUB_WORKSPACE}/vyos-build/data/build-flavors/daed-gateway.toml" <<'EOF'
          image_format = ["iso", "ova"]
          artifact_format = ["iso", "ova"]
          disk_size = 10

          build_hook = """
          #!/usr/bin/env bash
          set -euo pipefail

          RAW_IMAGE="$1"
          VERSION="$2"
          ARCH="$3"

          OUT="vyos-${VERSION}-daed-gateway-${ARCH}.ova"
          VMDK="vyos-${VERSION}-daed-gateway-${ARCH}.vmdk"
          OVF="vyos-${VERSION}-daed-gateway-${ARCH}.ovf"
          MF="vyos-${VERSION}-daed-gateway-${ARCH}.mf"

          qemu-img convert -f raw -O vmdk -o subformat=streamOptimized,adapter_type=lsilogic "${RAW_IMAGE}" "${VMDK}"
          VMDK_SIZE="$(stat -c '%s' "${VMDK}")"
          POPULATED_SIZE="$(du -B1 "${RAW_IMAGE}" | awk '{print $1}')"

          cat > "${OVF}" <<OVF
          <?xml version="1.0" encoding="UTF-8"?>
          <ovf:Envelope xmlns:ovf="http://schemas.dmtf.org/ovf/envelope/1" xmlns:rasd="http://schemas.dmtf.org/wbem/wscim/1/cim-schema/2/CIM_ResourceAllocationSettingData" xmlns:vssd="http://schemas.dmtf.org/wbem/wscim/1/cim-schema/2/CIM_VirtualSystemSettingData" xmlns:vmw="http://www.vmware.com/schema/ovf">
            <ovf:References>
              <ovf:File ovf:id="file1" ovf:href="${VMDK}" ovf:size="${VMDK_SIZE}"/>
            </ovf:References>
            <ovf:NetworkSection>
              <ovf:Info>Logical networks</ovf:Info>
              <ovf:Network ovf:name="WAN"/>
              <ovf:Network ovf:name="LAN"/>
            </ovf:NetworkSection>
            <ovf:DiskSection>
              <ovf:Info>Virtual disk information</ovf:Info>
              <ovf:Disk ovf:diskId="vmdisk1" ovf:fileRef="file1" ovf:capacity="10" ovf:capacityAllocationUnits="byte * 2^30" ovf:format="http://www.vmware.com/interfaces/specifications/vmdk.html#streamOptimized" ovf:populatedSize="${POPULATED_SIZE}"/>
            </ovf:DiskSection>
            <ovf:VirtualSystem ovf:id="VyOS">
              <ovf:Info>VyOS daed gateway</ovf:Info>
              <ovf:Name>VyOS daed gateway</ovf:Name>
              <ovf:OperatingSystemSection ovf:id="96" vmw:osType="debian12_64Guest">
                <ovf:Info>Debian GNU/Linux 12 (64-bit)</ovf:Info>
              </ovf:OperatingSystemSection>
              <ovf:VirtualHardwareSection>
                <ovf:Info>Virtual hardware requirements</ovf:Info>
                <ovf:System>
                  <vssd:ElementName>Virtual Hardware Family</vssd:ElementName>
                  <vssd:InstanceID>0</vssd:InstanceID>
                  <vssd:VirtualSystemType>vmx-13</vssd:VirtualSystemType>
                </ovf:System>
                <ovf:Item>
                  <rasd:AllocationUnits>hertz * 10^6</rasd:AllocationUnits>
                  <rasd:Description>Number of virtual CPUs</rasd:Description>
                  <rasd:ElementName>2 virtual CPU(s)</rasd:ElementName>
                  <rasd:InstanceID>1</rasd:InstanceID>
                  <rasd:ResourceType>3</rasd:ResourceType>
                  <rasd:VirtualQuantity>2</rasd:VirtualQuantity>
                </ovf:Item>
                <ovf:Item>
                  <rasd:AllocationUnits>byte * 2^20</rasd:AllocationUnits>
                  <rasd:Description>Memory Size</rasd:Description>
                  <rasd:ElementName>4096MB of memory</rasd:ElementName>
                  <rasd:InstanceID>2</rasd:InstanceID>
                  <rasd:ResourceType>4</rasd:ResourceType>
                  <rasd:VirtualQuantity>4096</rasd:VirtualQuantity>
                </ovf:Item>
                <ovf:Item>
                  <rasd:Address>0</rasd:Address>
                  <rasd:ElementName>SCSI Controller 0</rasd:ElementName>
                  <rasd:InstanceID>3</rasd:InstanceID>
                  <rasd:ResourceSubType>lsilogic</rasd:ResourceSubType>
                  <rasd:ResourceType>6</rasd:ResourceType>
                </ovf:Item>
                <ovf:Item>
                  <rasd:ElementName>Hard disk 1</rasd:ElementName>
                  <rasd:HostResource>ovf:/disk/vmdisk1</rasd:HostResource>
                  <rasd:InstanceID>4</rasd:InstanceID>
                  <rasd:Parent>3</rasd:Parent>
                  <rasd:ResourceType>17</rasd:ResourceType>
                </ovf:Item>
                <ovf:Item>
                  <rasd:AutomaticAllocation>true</rasd:AutomaticAllocation>
                  <rasd:Connection>WAN</rasd:Connection>
                  <rasd:Description>Ethernet adapter on WAN</rasd:Description>
                  <rasd:ElementName>Network adapter 1</rasd:ElementName>
                  <rasd:InstanceID>5</rasd:InstanceID>
                  <rasd:ResourceSubType>VmxNet3</rasd:ResourceSubType>
                  <rasd:ResourceType>10</rasd:ResourceType>
                </ovf:Item>
                <ovf:Item>
                  <rasd:AutomaticAllocation>true</rasd:AutomaticAllocation>
                  <rasd:Connection>LAN</rasd:Connection>
                  <rasd:Description>Ethernet adapter on LAN</rasd:Description>
                  <rasd:ElementName>Network adapter 2</rasd:ElementName>
                  <rasd:InstanceID>6</rasd:InstanceID>
                  <rasd:ResourceSubType>VmxNet3</rasd:ResourceSubType>
                  <rasd:ResourceType>10</rasd:ResourceType>
                </ovf:Item>
              </ovf:VirtualHardwareSection>
            </ovf:VirtualSystem>
          </ovf:Envelope>
          OVF

          sha1sum "${OVF}" "${VMDK}" | awk '{print "SHA1(" $2 ")= " $1}' > "${MF}"
          tar -cf "${OUT}" "${OVF}" "${MF}" "${VMDK}"
          echo "${OUT}"
          """
          EOF

      - name: Build injected ISO and OVA in vyos-build container
        shell: bash
        run: |
          set -euo pipefail
          BUILD_CMD="sudo --preserve-env ./build-vyos-image --architecture amd64 --build-by 'daed-gateway'"
          BUILD_CMD="${BUILD_CMD} --custom-package btop --custom-package nexttrace"
          BUILD_CMD="${BUILD_CMD} --custom-package curl --custom-package jq"
          BUILD_CMD="${BUILD_CMD} --custom-package tree --custom-package ripgrep --custom-package gdu"

          if [ "${USE_CHINA_MIRROR}" = "true" ]; then
            BUILD_CMD="${BUILD_CMD} --debian-mirror https://mirrors.tuna.tsinghua.edu.cn/debian"
            BUILD_CMD="${BUILD_CMD} --debian-security-mirror https://mirrors.tuna.tsinghua.edu.cn/debian-security"
            echo "Using Tsinghua Debian mirror."
          fi

          BUILD_CMD="${BUILD_CMD} daed-gateway"

          set +e
          docker run --rm --privileged \
            --sysctl net.ipv6.conf.lo.disable_ipv6=0 \
            -v "${GITHUB_WORKSPACE}/vyos-build:/vyos" \
            -w /vyos \
            "${VYOS_BUILD_IMAGE}" \
            bash -lc "${BUILD_CMD}"
          BUILD_STATUS="$?"
          set -e

          sudo chown -R "$(id -u):$(id -g)" "${GITHUB_WORKSPACE}/vyos-build/build" || true
          echo "Contents of vyos-build/build/:"
          find "${GITHUB_WORKSPACE}/vyos-build/build" -maxdepth 2 -type f -print -exec ls -lh {} \; || true

          if [ "${BUILD_STATUS}" -ne 0 ]; then
            if find "${GITHUB_WORKSPACE}/vyos-build/build" -maxdepth 1 -type f \( -name 'live-image-*.hybrid.iso' -o -name 'vyos-*.iso' \) | grep -q .; then
              echo "Build command failed after producing an ISO; continuing without optional OVA."
            else
              echo "Build command failed before producing an ISO." >&2
              exit "${BUILD_STATUS}"
            fi
          fi

      - name: Verify image artifacts
        shell: bash
        run: |
          set -euo pipefail
          sudo chown -R "$(id -u):$(id -g)" vyos-build/build
          ISO="$(
            find vyos-build/build -maxdepth 1 -type f \
              \( -name 'live-image-*.hybrid.iso' -o -name 'vyos-*.iso' \) \
              -printf '%s %p\n' |
              sort -nr |
              awk 'NR == 1 { $1=""; sub(/^ /, ""); print; exit }'
          )"
          if [ -z "${ISO}" ]; then
            echo "No ISO found in vyos-build/build." >&2
            find vyos-build/build -maxdepth 2 -type f -print -exec ls -lh {} \; || true
            exit 1
          fi
          cp "${ISO}" vyos-build/build/vyos-daed-gateway-amd64.iso
          sha256sum vyos-build/build/vyos-daed-gateway-amd64.iso | tee vyos-build/build/vyos-daed-gateway-amd64.iso.sha256
          ls -lh vyos-build/build/vyos-daed-gateway-amd64.iso

          OVA="$(
            find vyos-build/build -maxdepth 1 -type f -name '*.ova' \
              -printf '%s %p\n' |
              sort -nr |
              awk 'NR == 1 { $1=""; sub(/^ /, ""); print; exit }'
          )"
          if [ -z "${OVA}" ]; then
            echo "No OVA found; skipping optional OVA artifact."
            find vyos-build/build -maxdepth 2 -type f -print -exec ls -lh {} \; || true
            exit 0
          fi
          cp "${OVA}" vyos-build/build/vyos-daed-gateway-amd64.ova
          sha256sum vyos-build/build/vyos-daed-gateway-amd64.ova | tee vyos-build/build/vyos-daed-gateway-amd64.ova.sha256
          ls -lh vyos-build/build/vyos-daed-gateway-amd64.ova

      - name: Upload injected ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: vyos15-daed-gateway-iso
          path: |
            vyos-build/build/vyos-daed-gateway-amd64.iso
            vyos-build/build/vyos-daed-gateway-amd64.iso.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload VMware OVA artifact
        if: ${{ hashFiles('vyos-build/build/vyos-daed-gateway-amd64.ova') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: vyos15-daed-gateway-ova
          path: |
            vyos-build/build/vyos-daed-gateway-amd64.ova
            vyos-build/build/vyos-daed-gateway-amd64.ova.sha256
          if-no-files-found: ignore
          retention-days: 14
