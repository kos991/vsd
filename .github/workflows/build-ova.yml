name: Build VyOS 1.5 daed Gateway OVA

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      base_iso_url:
        description: "可选：已有 VyOS 1.5 x86_64 ISO URL；为空时自动下载最新 VyOS 1.5 rolling ISO"
        required: false
        type: string
        default: ""
      daed_version:
        description: "daed release tag，或 latest"
        required: true
        type: string
        default: latest
      disk_size:
        description: "虚拟磁盘大小，单位 MB"
        required: true
        type: string
        default: "8192"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build OVA
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      BASE_ISO_URL: ${{ inputs.base_iso_url || vars.BASE_ISO_URL || '' }}
      DAED_VERSION: ${{ inputs.daed_version || 'latest' }}
      DISK_SIZE: ${{ inputs.disk_size || '8192' }}
      VYOS_NIGHTLY_REPO: vyos/vyos-nightly-build
      DIST_DIR: ${{ github.workspace }}/dist

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare diagnostics
        shell: bash
        run: |
          set -e
          mkdir -p "${DIST_DIR}"
          {
            echo "run_id=${GITHUB_RUN_ID}"
            echo "sha=${GITHUB_SHA}"
            echo "base_iso_url=${BASE_ISO_URL:-<auto-download-vyos-1.5-rolling>}"
            echo "vyos_nightly_repo=${VYOS_NIGHTLY_REPO}"
            echo "daed_version=${DAED_VERSION}"
            echo "disk_size=${DISK_SIZE}"
          } >"${DIST_DIR}/ci-context.txt"
          echo 125 >"${DIST_DIR}/build.status"
          echo "Build prepared. ISO has not been resolved yet." >"${DIST_DIR}/build.log"

      - name: Install build tools
        shell: bash
        run: |
          set -e
          exec > >(tee "${DIST_DIR}/install-tools.log") 2>&1
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bash \
            ca-certificates \
            curl \
            git \
            jq \
            ovmf \
            python3 \
            python3-pip \
            qemu-system-x86 \
            qemu-utils \
            tar \
            unzip \
            xorriso

      - name: Setup Packer
        uses: hashicorp/setup-packer@v3
        with:
          version: latest

      - name: Resolve VyOS 1.5 base ISO
        id: iso
        shell: bash
        run: |
          set -e
          exec > >(tee "${DIST_DIR}/resolve-iso.log") 2>&1
          mkdir -p "${GITHUB_WORKSPACE}/packer/cache"

          if [ -n "${BASE_ISO_URL}" ]; then
            echo "Using provided BASE_ISO_URL."
            curl -fL --retry 5 --retry-delay 5 "${BASE_ISO_URL}" -o "${GITHUB_WORKSPACE}/packer/cache/vyos-1.5.iso"
          else
            echo "BASE_ISO_URL is empty. Downloading latest VyOS 1.5 rolling ISO from ${VYOS_NIGHTLY_REPO}."
            RELEASE_JSON="$(curl -fsSL --retry 5 --retry-delay 5 "https://api.github.com/repos/${VYOS_NIGHTLY_REPO}/releases/latest")"
            ISO_URL="$(echo "${RELEASE_JSON}" | jq -r '.assets[] | select(.name | test("^vyos-.*-rolling-generic-amd64\\.iso$")) | .browser_download_url' | head -n 1)"
            if [ -z "${ISO_URL}" ] || [ "${ISO_URL}" = "null" ]; then
              echo "Unable to resolve latest VyOS rolling amd64 ISO from ${VYOS_NIGHTLY_REPO}." >&2
              exit 1
            fi
            echo "Resolved ISO: ${ISO_URL}"
            curl -fL --retry 5 --retry-delay 5 "${ISO_URL}" -o "${GITHUB_WORKSPACE}/packer/cache/vyos-1.5.iso"
          fi

          ISO_FILE="${GITHUB_WORKSPACE}/packer/cache/vyos-1.5.iso"
          test -s "${ISO_FILE}"
          ISO_SHA256="$(sha256sum "${ISO_FILE}" | awk '{print $1}')"
          echo "iso_path=${ISO_FILE}" >>"${GITHUB_OUTPUT}"
          echo "iso_checksum=sha256:${ISO_SHA256}" >>"${GITHUB_OUTPUT}"
          cp "${ISO_FILE}" "${DIST_DIR}/base-vyos-1.5.iso"
          echo "${ISO_SHA256}  base-vyos-1.5.iso" >"${DIST_DIR}/base-vyos-1.5.iso.sha256"

      - name: Packer init
        shell: bash
        run: packer init packer/build.pkr.hcl

      - name: Packer validate
        shell: bash
        run: |
          packer validate \
            -var "iso_url=${{ steps.iso.outputs.iso_path }}" \
            -var "iso_checksum=${{ steps.iso.outputs.iso_checksum }}" \
            -var "disk_size=${DISK_SIZE}" \
            -var "daed_version=${DAED_VERSION}" \
            packer/build.pkr.hcl

      - name: Packer build
        shell: bash
        run: |
          set +e
          packer build \
            -var "iso_url=${{ steps.iso.outputs.iso_path }}" \
            -var "iso_checksum=${{ steps.iso.outputs.iso_checksum }}" \
            -var "disk_size=${DISK_SIZE}" \
            -var "daed_version=${DAED_VERSION}" \
            packer/build.pkr.hcl 2>&1 | tee "${DIST_DIR}/packer-build.log"
          status="${PIPESTATUS[0]}"
          echo "${status}" >"${DIST_DIR}/build.status"
          cp "${DIST_DIR}/packer-build.log" "${DIST_DIR}/build.log"
          exit "${status}"

      - name: Collect artifact files
        if: always()
        shell: bash
        run: |
          set +e
          mkdir -p "${DIST_DIR}"
          find artifacts -maxdepth 1 -type f -name '*.ova' -exec cp {} "${DIST_DIR}/" \; 2>/dev/null || true
          if [ ! -f "${DIST_DIR}/build.status" ]; then
            echo 124 >"${DIST_DIR}/build.status"
          fi
          find "${DIST_DIR}" -maxdepth 1 -type f -print -exec ls -lh {} \; || true

      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vyos15-daed-gateway-diagnostics
          path: |
            ${{ github.workspace }}/dist/*.log
            ${{ github.workspace }}/dist/*.status
            ${{ github.workspace }}/dist/*context*.txt
            ${{ github.workspace }}/dist/*.sha256
          if-no-files-found: warn
          retention-days: 14

      - name: Upload OVA
        uses: actions/upload-artifact@v4
        with:
          name: vyos15-daed-gateway-ova
          path: ${{ github.workspace }}/dist/*.ova
          if-no-files-found: error
          retention-days: 14
