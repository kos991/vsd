name: Build Alpine gateway OVA

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      alpine_version:
        description: Alpine release branch
        required: true
        default: '3.24'
      daed_version:
        description: daed release tag, or latest
        required: true
        default: latest
      mini_ppdns_ref:
        description: mini-ppdns binary branch/ref
        required: true
        default: release
      disk_size:
        description: Raw disk image size
        required: true
        default: 4G
      memory_mb:
        description: OVF memory hint in MB
        required: true
        default: '1024'
      cpu_count:
        description: OVF CPU hint
        required: true
        default: '1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build OVA
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ALPINE_VERSION: ${{ inputs.alpine_version || '3.24' }}
      DAED_VERSION: ${{ inputs.daed_version || 'latest' }}
      MINI_PPDNS_REF: ${{ inputs.mini_ppdns_ref || 'release' }}
      DISK_SIZE: ${{ inputs.disk_size || '4G' }}
      MEMORY_MB: ${{ inputs.memory_mb || '1024' }}
      CPU_COUNT: ${{ inputs.cpu_count || '1' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare diagnostics artifact
        run: |
          DIST_DIR="${GITHUB_WORKSPACE}/dist"
          mkdir -p "${DIST_DIR}"
          {
            echo "run_id=${GITHUB_RUN_ID}"
            echo "sha=${GITHUB_SHA}"
            echo "alpine_version=${ALPINE_VERSION}"
            echo "daed_version=${DAED_VERSION}"
            echo "mini_ppdns_ref=${MINI_PPDNS_REF}"
            echo "disk_size=${DISK_SIZE}"
          } >"${DIST_DIR}/ci-context.txt"
          echo 125 >"${DIST_DIR}/build.status"
          echo "Build did not start yet. Check earlier workflow steps." >"${DIST_DIR}/build.log"

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bash \
            ca-certificates \
            curl \
            dosfstools \
            e2fsprogs \
            fdisk \
            grub2-common \
            grub-pc-bin \
            libarchive-tools \
            parted \
            qemu-utils \
            rsync \
            tar \
            xz-utils

      - name: Run template smoke tests
        shell: bash
        run: |
          DIST_DIR="${GITHUB_WORKSPACE}/dist"
          mkdir -p "${DIST_DIR}"
          status=0
          pwsh -NoProfile -ExecutionPolicy Bypass -File ./tests/smoke.ps1 >"${DIST_DIR}/smoke.log" 2>&1 || status=$?
          cat "${DIST_DIR}/smoke.log"
          exit "${status}"

      - name: Build OVA
        run: bash scripts/ci-build-ova.sh

      - name: List artifact files
        if: always()
        run: |
          DIST_DIR="${GITHUB_WORKSPACE}/dist"
          mkdir -p "${DIST_DIR}"
          if [ ! -f "${DIST_DIR}/build.status" ]; then
            echo 124 >"${DIST_DIR}/build.status"
            echo "Build status was missing before artifact upload." >"${DIST_DIR}/build.log"
          fi
          {
            echo "### Artifact files"
            find "${DIST_DIR}" -maxdepth 2 -type f -print -exec ls -lh {} \; || true
          } | tee -a "${GITHUB_STEP_SUMMARY}"

      - name: Upload OVA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daed-alpine-gateway-ova
          path: ${{ github.workspace }}/dist
          if-no-files-found: error
          retention-days: 14

      - name: Check build result
        run: |
          test "$(cat "${GITHUB_WORKSPACE}/dist/build.status")" -eq 0
