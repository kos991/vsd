# VyOS Build Configuration

# Kernel version (optional: set to specific version like "6.18.33" to build custom kernel)
# Leave empty or comment out to use VyOS default kernel
KERNEL_VERSION=""

# VyOS build branch
VYOS_BUILD_REF="sagitta"

# VyOS build Docker image
VYOS_BUILD_IMAGE="vyos/vyos-build:sagitta"

# Debian mirror (for China users, uncomment the following lines)
# DEBIAN_MIRROR="https://mirrors.tuna.tsinghua.edu.cn/debian"
# DEBIAN_SECURITY_MIRROR="https://mirrors.tuna.tsinghua.edu.cn/debian-security"

# Additional packages to include
ADDITIONAL_PACKAGES=(
    "btop"
    "nexttrace"
    "tree"
    "ripgrep"
    "gdu"
    "qemu-guest-agent"
)

# Enable patches
ENABLE_PODMAN_FIX=true
ENABLE_MELLANOX_SUPPORT=true
ENABLE_NEXTTRACE_REPO=true
ENABLE_KERNEL_PATCHES=false  # Set to true if building custom kernel
