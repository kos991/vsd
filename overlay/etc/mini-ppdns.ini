# mini-ppdns default configuration for the Alpine dae gateway image.
# Replace these upstreams with DNS endpoints that fit your network.

[dns]
223.5.5.5:53
119.29.29.29:53

[fall]
1.1.1.1:53
8.8.8.8:53

[listen]
0.0.0.0:53

[adv]
qtime=250
aaaa=noerror
lite=yes
boguspriv=1

[hosts]
# 10.10.10.53 paopao.dns

[hook]
# exec="curl -o /dev/null -s -w %{http_code} http://www.gstatic.com/generate_204"
# exit_code=0
# keyword="204"
# sleep_time=60
# retry_time=5
# count=10
